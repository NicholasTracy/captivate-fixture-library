# Validates community fixture PRs and merges them with the github-actions bot.
# Lets contributors (including repo owners) submit via Captivate without self-approving.

name: Fixture PR validate and merge

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  workflow_dispatch:
    inputs:
      pull_number:
        description: Pull request number to validate and merge
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    if: |
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.head_ref, 'fixture/') ||
      contains(github.event.pull_request.labels.*.name, 'fixture-submission')
    runs-on: ubuntu-latest
    concurrency:
      group: fixture-pr-${{ github.event.pull_request.number || github.event.inputs.pull_number }}
      cancel-in-progress: false
    steps:
      - name: Resolve pull request
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber =
              context.payload.pull_request?.number ??
              Number(context.payload.inputs?.pull_number);
            if (!Number.isFinite(prNumber)) {
              core.setFailed('No pull request number.');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pr.merged) {
              core.setOutput('skip', 'already_merged');
              return;
            }
            if (pr.state !== 'open') {
              core.setFailed(`PR #${prNumber} is not open.`);
              return;
            }
            core.setOutput('number', String(prNumber));
            core.setOutput('head_ref', pr.head.ref);

      - name: Validate changed fixture files
        if: steps.pr.outputs.skip != 'already_merged'
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            if (files.length === 0) {
              core.setFailed('Pull request has no changed files.');
              return;
            }

            for (const file of files) {
              if (file.status === 'removed') {
                core.setFailed(`Removing library files is not allowed: ${file.filename}`);
                return;
              }
              if (!file.filename.startsWith('fixtures/')) {
                core.setFailed(`Only files under fixtures/ are allowed, got: ${file.filename}`);
                return;
              }
              if (!file.filename.endsWith('.json')) {
                core.setFailed(`Fixture files must be .json: ${file.filename}`);
                return;
              }
            }

            const addedOrModified = files.filter((f) => f.status !== 'removed');
            if (addedOrModified.length !== 1) {
              core.setFailed(
                `Expected exactly one fixture file per PR, found ${addedOrModified.length}.`
              );
              return;
            }

            const target = addedOrModified[0];
            const { data: content } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: target.filename,
              ref: pr.head.sha,
            });
            if (Array.isArray(content)) {
              core.setFailed(`Unexpected directory path: ${target.filename}`);
              return;
            }
            const raw = Buffer.from(content.content, 'base64').toString('utf8');
            let parsed;
            try {
              parsed = JSON.parse(raw);
            } catch (e) {
              core.setFailed(`Invalid JSON in ${target.filename}`);
              return;
            }

            const fixtures = Array.isArray(parsed.fixtures) ? parsed.fixtures : [];
            if (fixtures.length === 0) {
              core.setFailed(`${target.filename}: missing non-empty fixtures array.`);
              return;
            }
            if (parsed.schema && parsed.schema !== 'captivate.fixture-library') {
              core.setFailed(`${target.filename}: unsupported schema.`);
              return;
            }

            core.setOutput('path', target.filename);
            core.setOutput('fixture_count', String(fixtures.length));

      - name: Approve pull request
        if: steps.pr.outputs.skip != 'already_merged' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body:
                  'Automated approval: Captivate fixture library checks passed (valid JSON, single file under `fixtures/`).',
              });
            } catch (err) {
              // Already approved or review not required
              core.info(`Approve skipped or redundant: ${err.message}`);
            }

      - name: Merge pull request
        if: steps.pr.outputs.skip != 'already_merged' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = Number('${{ steps.pr.outputs.number }}');
            const { data: merge } = await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash',
              commit_title: `Add fixture: ${{ steps.validate.outputs.path }}`,
            });
            if (!merge.merged) {
              core.setFailed(merge.message ?? 'Merge failed.');
              return;
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body:
                `Merged automatically after validation (\`${{ steps.validate.outputs.path }}\`, ${{ steps.validate.outputs.fixture_count }} fixture(s)). It will appear in **Captivate Community Library** after a short refresh.`,
            });
